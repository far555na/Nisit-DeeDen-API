info:
  name: Get all categories
  type: http
  seq: 1

http:
  method: GET
  url: "{{host}}/api/categories"
  headers:
    - name: Authorization
      value: Bearer {{token}}
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  auth: inherit

runtime:
  variables:
    - name: host
      value: localhost

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
