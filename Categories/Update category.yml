info:
  name: Update category
  type: http
  seq: 6

http:
  method: PUT
  url: "{{host}}/api/categories/{{category-slug}}"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "Academic Excellence",
        "attributes": [
          {
            "id": 13,
            "label": "GPAX",
            "type": "text"
          },
          {
            "id": 14,
            "label": "Certificate",
            "type": "file"
          },
          {
            "id": 15,
            "label": "Certificate2",
            "type": "file"
          }
        ]
      }
  auth: inherit

runtime:
  variables:
    - name: category-slug
      value: study

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
