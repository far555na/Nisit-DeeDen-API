info:
  name: Show category by id
  type: http
  seq: 2

http:
  method: GET
  url: "{{host}}/api/categories/{{id}}"
  headers:
    - name: Authorization
      value: Bearer {{token}}
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  auth: inherit

runtime:
  variables:
    - name: category-slug
      value: behavior
    - name: host
      value: localhost
    - name: id
      value: "1"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
