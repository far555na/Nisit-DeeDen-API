info:
  name: Show user by id
  type: http
  seq: 2

http:
  method: GET
  url: "{{host}}/api/users/{{id}}?Authorization=Bearer {{token}}&Accept=application/json&Content-Type=application/json"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  params:
    - name: Authorization
      value: Bearer {{token}}
      type: query
    - name: Accept
      value: application/json
      type: query
    - name: Content-Type
      value: application/json
      type: query
  auth: inherit

runtime:
  variables:
    - name: id
      value: "10"
    - name: host
      value: localhost

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
