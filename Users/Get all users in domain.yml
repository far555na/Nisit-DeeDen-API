info:
  name: Get all users in domain
  type: http
  seq: 1

http:
  method: GET
  url: "{{host}}/api/users"
  headers:
    - name: Authorization
      value: Bearer {{token}}
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
