info:
  name: Get active round application by user id
  type: http
  seq: 13

http:
  method: GET
  url: "{{host}}/api/applications/user/{{id}}/active"
  headers:
    - name: Authorization
      value: Bearer {{token}}
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  auth: inherit

runtime:
  variables:
    - name: id
      value: "3"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
