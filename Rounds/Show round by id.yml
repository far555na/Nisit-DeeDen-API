info:
  name: Show round by id
  type: http
  seq: 2

http:
  method: GET
  url: "{{host}}/api/rounds/{{id}}"
  headers:
    - name: Authorization
      value: Bearer {{token}}
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  auth: inherit

runtime:
  variables:
    - name: id
      value: "6"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
